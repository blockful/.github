name: Extract ClickUp task ID
description: Finds a ClickUp custom task ID (PREFIX-123) in branch name, PR title, or PR body. Skips bot actors.
inputs:
  branch:
    description: Branch name to search first
    default: ""
  pr-title:
    description: PR title (first fallback)
    default: ""
  pr-body:
    description: PR body (second fallback)
    default: ""
  prefix:
    description: Custom task ID prefix
    default: "DEV"
  actor:
    description: GitHub actor, used to skip bots
    default: ""
outputs:
  found:
    description: "true when a task ID was found"
    value: ${{ steps.extract.outputs.found }}
  task-id:
    description: The task ID (e.g. DEV-970), empty when not found
    value: ${{ steps.extract.outputs.task_id }}
  skip-reason:
    description: "bot | invalid_prefix | none | empty when found"
    value: ${{ steps.extract.outputs.skip_reason }}
runs:
  using: composite
  steps:
    - id: extract
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY: ${{ inputs.pr-body }}
        PREFIX: ${{ inputs.prefix }}
        ACTOR: ${{ inputs.actor }}
      run: bash "${GITHUB_ACTION_PATH}/extract.sh" >> "$GITHUB_OUTPUT"
